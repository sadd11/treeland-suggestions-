<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Админка — Treeland Mods</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --md3-primary: #6750a4;
      --md3-on-primary: #ffffff;
      --md3-primary-container: #eaddff;
      --md3-on-primary-container: #21005d;

      --md3-surface: #fdf8ff;
      --md3-on-surface: #1d1b20;
      --md3-surface-variant: #e7e0ec;
      --md3-on-surface-variant: #49454f;
      --md3-outline: #79747e;

      --md3-error: #b3261e;
      --md3-on-error: #ffffff;

      --md3-radius: 18px;
      --md3-radius-small: 12px;
      --md3-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }

    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: var(--md3-surface);
      color: var(--md3-on-surface);
      padding: 16px;
      display: flex;
      justify-content: center;
    }

    .app {
      width: 100%;
      max-width: 900px;
    }

    .card {
      background: var(--md3-surface);
      border-radius: var(--md3-radius);
      padding: 16px;
      box-shadow: var(--md3-shadow);
      margin-bottom: 16px;
    }

    .title {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 0.9rem;
      color: var(--md3-on-surface-variant);
      margin-bottom: 16px;
    }

    .text-input {
      width: 100%;
      padding: 10px 12px;
      border-radius: var(--md3-radius-small);
      border: 1px solid var(--md3-outline);
      font-size: 0.9rem;
      margin-bottom: 12px;
    }

    .btn {
      padding: 8px 14px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
      margin-right: 6px;
    }

    .btn-filled {
      background: var(--md3-primary);
      color: var(--md3-on-primary);
    }

    .btn-outlined {
      background: transparent;
      border: 1px solid var(--md3-outline);
      color: var(--md3-on-surface);
    }

    .mod-card {
      background: var(--md3-surface-variant);
      padding: 12px;
      border-radius: var(--md3-radius-small);
      margin-bottom: 10px;
    }

    .status {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 0.75rem;
      margin-bottom: 6px;
    }

    .status-approved { background: #c8e6c9; color: #1b5e20; }
    .status-rejected { background: #ffcdd2; color: #b71c1c; }
    .status-pending  { background: #fff9c4; color: #f57f17; }

    .actions {
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="app">

    <!-- ВХОД -->
    <div id="loginCard" class="card">
      <div class="title">Вход в админку</div>
      <div class="subtitle">Введите пароль администратора</div>

      <input id="passwordInput" class="text-input" type="password" placeholder="Пароль" />
      <button id="loginBtn" class="btn btn-filled">Войти</button>
      <div id="loginError" style="color:#b3261e; margin-top:8px; display:none;">
        Неверный пароль
      </div>
    </div>

    <!-- АДМИНКА -->
    <div id="adminPanel" style="display:none;">

      <div class="card">
        <div class="title">Админ‑панель</div>
        <div class="subtitle">Управление предложенными модами</div>

        <input id="filterInput" class="text-input" placeholder="Фильтр по ссылке/описанию/нику" />

        <select id="sortSelect" class="text-input">
          <option value="new">Сначала новые</option>
          <option value="old">Сначала старые</option>
          <option value="approved">Одобренные</option>
          <option value="pending">Ожидают</option>
          <option value="rejected">Отклонённые</option>
        </select>

        <button id="refreshBtn" class="btn btn-outlined">Обновить</button>
      </div>

      <div id="modsContainer"></div>

    </div>

  </div>

  <script>
    const BACKEND = "https://YOUR_BACKEND_URL_HERE"; // ← ВСТАВЬ СВОЙ BACKEND
    const ADMIN_PASSWORD = "tl-358856";

    const loginCard = document.getElementById("loginCard");
    const adminPanel = document.getElementById("adminPanel");
    const passwordInput = document.getElementById("passwordInput");
    const loginBtn = document.getElementById("loginBtn");
    const loginError = document.getElementById("loginError");

    const modsContainer = document.getElementById("modsContainer");
    const filterInput = document.getElementById("filterInput");
    const sortSelect = document.getElementById("sortSelect");
    const refreshBtn = document.getElementById("refreshBtn");

    let mods = [];

    loginBtn.onclick = () => {
      if (passwordInput.value === ADMIN_PASSWORD) {
        loginCard.style.display = "none";
        adminPanel.style.display = "block";
        loadMods();
        setInterval(loadMods, 10000); // автообновление
      } else {
        loginError.style.display = "block";
      }
    };

    async function loadMods() {
      const res = await fetch(`${BACKEND}/admin/list-all?password=${ADMIN_PASSWORD}`);
      mods = await res.json();
      renderMods();
    }

    function renderMods() {
      let list = [...mods];

      const f = filterInput.value.toLowerCase();
      if (f) {
        list = list.filter(m =>
          m.url.toLowerCase().includes(f) ||
          m.reason.toLowerCase().includes(f) ||
          (m.nick && m.nick.toLowerCase().includes(f))
        );
      }

      const s = sortSelect.value;
      if (s === "new") list.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
      if (s === "old") list.sort((a,b)=>new Date(a.createdAt)-new Date(b.createdAt));
      if (s === "approved") list = list.filter(m=>m.status==="approved");
      if (s === "pending") list = list.filter(m=>m.status==="pending");
      if (s === "rejected") list = list.filter(m=>m.status==="rejected");

      modsContainer.innerHTML = "";

      list.forEach(mod => {
        const card = document.createElement("div");
        card.className = "mod-card";

        const statusClass = {
          approved: "status-approved",
          rejected: "status-rejected",
          pending: "status-pending"
        }[mod.status];

        card.innerHTML = `
          <div class="status ${statusClass}">${mod.status}</div>
          <div><b>Ссылка:</b> ${mod.url}</div>
          <div><b>Описание:</b> ${mod.reason}</div>
          <div><b>Ник:</b> ${mod.nick || "—"}</div>
          <div><b>Дата:</b> ${new Date(mod.createdAt).toLocaleString("ru-RU")}</div>

          <div class="actions">
            <button class="btn btn-filled" onclick="approve(${mod.id})">Одобрить</button>
            <button class="btn btn-outlined" onclick="reject(${mod.id})">Отклонить</button>
            <button class="btn btn-outlined" onclick="del(${mod.id})">Удалить</button>
          </div>
        `;

        modsContainer.appendChild(card);
      });
    }

    async function approve(id) {
      await fetch(`${BACKEND}/admin/approve`, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({id, password: ADMIN_PASSWORD})
      });
      loadMods();
    }

    async function reject(id) {
      await fetch(`${BACKEND}/admin/reject`, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({id, password: ADMIN_PASSWORD})
      });
      loadMods();
    }

    async function del(id) {
      await fetch(`${BACKEND}/admin/delete`, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({id, password: ADMIN_PASSWORD})
      });
      loadMods();
    }

    refreshBtn.onclick = loadMods;
    filterInput.oninput = renderMods;
    sortSelect.onchange = renderMods;
  </script>
</body>
</html>
