<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Treeland — Админка модов</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    color-scheme: light dark;
    --md-sys-color-primary: #4f46e5;
    --md-sys-color-error: #dc2626;
    --md-sys-color-surface: #f5f5f5;
    --md-sys-color-on-surface: #111827;
    --md-sys-color-outline: #d1d5db;
  }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Roboto", sans-serif;
    background: var(--md-sys-color-surface);
    color: var(--md-sys-color-on-surface);
    padding: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .card {
    width: 100%;
    max-width: 520px;
    background: #fff;
    border-radius: 18px;
    padding: 20px 18px;
    box-shadow: 0 8px 24px rgba(15,23,42,0.12);
    margin-top: 16px;
  }
  h1, h2 {
    margin: 0 0 8px;
    font-weight: 600;
  }
  label {
    display: block;
    font-size: 13px;
    margin-top: 8px;
    margin-bottom: 4px;
    color: #6b7280;
  }
  input {
    width: 100%;
    border-radius: 12px;
    border: 1px solid var(--md-sys-color-outline);
    padding: 10px 12px;
    font-size: 14px;
    outline: none;
    background: #f9fafb;
  }
  input:focus {
    border-color: var(--md-sys-color-primary);
    box-shadow: 0 0 0 1px var(--md-sys-color-primary);
    background: #fff;
  }
  button {
    border: none;
    border-radius: 999px;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
  }
  .btn-primary {
    background: var(--md-sys-color-primary);
    color: #fff;
  }
  .btn-outline {
    background: transparent;
    color: #374151;
    border: 1px solid #d1d5db;
  }
  .btn-error {
    background: var(--md-sys-color-error);
    color: #fff;
  }
  .top-row {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-top: 10px;
  }
  .mod {
    background: #fff;
    border-radius: 16px;
    padding: 12px 14px;
    margin-top: 10px;
    border: 1px solid #e5e7eb;
  }
  .chip {
    display: inline-flex;
    align-items: center;
    border-radius: 999px;
    padding: 2px 10px;
    font-size: 11px;
    margin-top: 4px;
  }
  .chip-pending {
    background: #fef3c7;
    color: #92400e;
  }
  .chip-approved {
    background: #dcfce7;
    color: #166534;
  }
</style>
</head>
<body>

<div class="card">
  <h1>Админка модов</h1>
  <p style="font-size:13px;color:#6b7280;margin-bottom:8px;">
    Введите админ‑пароль, чтобы управлять предложенными модами.
  </p>

  <label for="password">Пароль</label>
  <input id="password" type="password" placeholder="tl-358856" value="tl-358856">

  <div class="top-row">
    <button class="btn-primary" onclick="loadAll()">Загрузить список</button>
  </div>
</div>

<div class="card">
  <h2 style="margin:0 0 8px;">Все предложения</h2>
  <div id="mods"></div>
</div>

<script>
const API = "https://treeland-mods-suggestions-backend.onrender.com";

function getPassword() {
  return document.getElementById("password").value.trim();
}

function loadAll() {
  const pwd = getPassword();
  if (!pwd) {
    alert("Введите пароль");
    return;
  }

  fetch(API + "/admin/list-all?password=" + encodeURIComponent(pwd))
    .then(r => {
      if (!r.ok) throw new Error("Ошибка доступа");
      return r.json();
    })
    .then(data => {
      const box = document.getElementById("mods");
      box.innerHTML = "";
      if (!data.length) {
        box.innerHTML = '<p style="font-size:13px;color:#6b7280;">Пока нет предложений.</p>';
        return;
      }
      data.forEach(mod => {
        const status = mod.status || "pending";
        const statusChip = status === "approved"
          ? `<span class="chip chip-approved">Одобрен</span>`
          : `<span class="chip chip-pending">Ожидает</span>`;

        box.innerHTML += `
          <div class="mod">
            <div style="font-size:13px;color:#6b7280;">ID: ${mod.id}</div>
            <div style="font-size:14px;margin-top:4px;">
              <a href="${mod.link}" target="_blank">${mod.link}</a>
            </div>
            <div style="font-size:13px;margin-top:4px;">${mod.desc || "Без описания"}</div>
            ${statusChip}
            <div style="margin-top:8px;display:flex;gap:8px;">
              <button class="btn-outline" onclick="approve(${mod.id})">Одобрить</button>
              <button class="btn-error" onclick="del(${mod.id})">Удалить</button>
            </div>
          </div>
        `;
      });
    })
    .catch(() => alert("Неверный пароль или ошибка сервера"));
}

function approve(id) {
  const pwd = getPassword();
  fetch(API + "/admin/approve?id=" + id + "&password=" + encodeURIComponent(pwd), {
    method: "POST"
  })
  .then(r => {
    if (!r.ok) throw new Error();
    return r.json();
  })
  .then(() => loadAll())
  .catch(() => alert("Ошибка при одобрении"));
}

function del(id) {
  const pwd = getPassword();
  if (!confirm("Удалить мод ID " + id + "?")) return;

  fetch(API + "/admin/delete?id=" + id + "&password=" + encodeURIComponent(pwd), {
    method: "POST"
  })
  .then(r => {
    if (!r.ok) throw new Error();
    return r.json();
  })
  .then(() => loadAll())
  .catch(() => alert("Ошибка при удалении"));
}
</script>

</body>
</html>
