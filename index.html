<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Treeland — Предложение модов</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    color-scheme: light dark;
    --md-sys-color-primary: #4f46e5;
    --md-sys-color-surface: #f5f5f5;
    --md-sys-color-on-surface: #111827;
    --md-sys-color-outline: #d1d5db;
  }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Roboto", sans-serif;
    background: var(--md-sys-color-surface);
    color: var(--md-sys-color-on-surface);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
  }
  .card {
    width: 100%;
    max-width: 480px;
    background: #fff;
    border-radius: 18px;
    padding: 20px 18px;
    box-shadow: 0 8px 24px rgba(15,23,42,0.12);
    margin-top: 16px;
  }
  h1, h2 {
    margin: 0 0 8px;
    font-weight: 600;
  }
  label {
    display: block;
    font-size: 13px;
    margin-top: 12px;
    margin-bottom: 4px;
    color: #6b7280;
  }
  input, textarea {
    width: 100%;
    border-radius: 12px;
    border: 1px solid var(--md-sys-color-outline);
    padding: 10px 12px;
    font-size: 14px;
    outline: none;
    background: #f9fafb;
  }
  input:focus, textarea:focus {
    border-color: var(--md-sys-color-primary);
    box-shadow: 0 0 0 1px var(--md-sys-color-primary);
    background: #fff;
  }
  button {
    margin-top: 16px;
    width: 100%;
    border: none;
    border-radius: 999px;
    padding: 12px;
    font-size: 15px;
    font-weight: 500;
    background: var(--md-sys-color-primary);
    color: #fff;
    cursor: pointer;
  }
  button:active {
    transform: scale(0.98);
  }
  .mod {
    background: #fff;
    border-radius: 16px;
    padding: 12px 14px;
    margin-top: 10px;
    border: 1px solid #e5e7eb;
  }
  .mod small {
    color: #6b7280;
    font-size: 12px;
  }
</style>
</head>
<body>

<div class="card">
  <h1>Предложить мод</h1>
  <p style="font-size:13px;color:#6b7280;margin-bottom:8px;">
    Отправь ссылку на мод, который хочешь видеть на Treeland. После проверки он появится ниже.
  </p>

  <label for="link">Ссылка на мод</label>
  <input id="link" placeholder="https://...">

  <label for="desc">Комментарий (необязательно)</label>
  <textarea id="desc" rows="3" placeholder="Почему этот мод стоит добавить?"></textarea>

  <button onclick="sendMod()">Отправить</button>
</div>

<div class="card">
  <h2>Одобренные моды</h2>
  <div id="mods"></div>
</div>

<script>
const API = "https://treeland-mods-suggestions-backend.onrender.com";

function sendMod() {
  const link = document.getElementById("link").value.trim();
  const desc = document.getElementById("desc").value.trim();

  if (!link) {
    alert("Введите ссылку на мод");
    return;
  }

  fetch(API + "/add", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ link, desc })
  })
  .then(r => r.json())
  .then(res => {
    if (res.error) {
      alert("Ошибка: " + res.error);
      return;
    }
    alert("Мод отправлен на рассмотрение");
    document.getElementById("link").value = "";
    document.getElementById("desc").value = "";
    loadMods();
  })
  .catch(() => alert("Ошибка сети"));
}

function loadMods() {
  fetch(API + "/list")
    .then(r => r.json())
    .then(data => {
      const box = document.getElementById("mods");
      box.innerHTML = "";
      if (!data.length) {
        box.innerHTML = '<p style="font-size:13px;color:#6b7280;">Пока нет одобренных модов.</p>';
        return;
      }
      data.forEach(mod => {
        box.innerHTML += `
          <div class="mod">
            <div style="font-size:14px;">
              <a href="${mod.link}" target="_blank">${mod.link}</a>
            </div>
            <small>${mod.desc || "Без описания"}</small>
          </div>
        `;
      });
    })
    .catch(() => {
      document.getElementById("mods").innerHTML =
        '<p style="font-size:13px;color:#b91c1c;">Не удалось загрузить список модов.</p>';
    });
}

loadMods();
</script>

</body>
</html>
